# 多核 Ring ESL 独立运行场景配置。
# 单位约定：latency、delay、cycles 均为时钟周期；width、size 均为字节；
# OSD 表示未完成事务数量上限；in-flight 表示单条 Link 上的在途报文数量上限。
# [default] 是所有多核场景的公共配置，[case.<名称>] 仅覆盖该场景的差异项。

[default]
# DDR/PEM 公共运行时 TOML。相对路径以测试程序运行目录为基准。
# 该文件继续负责 DDR 读写延迟、credit 上限/补充参数及 BIU 配置；
# 本文件不复制这些参数，只保存 Ring 拓扑、链路和场景级限制。
ddr_config = "../etc/pem_config_cloud.toml"

# 拓扑和负载规模：每个 Master 独立产生 uops_per_master 个操作。
num_masters = 4               # Master/Core 数量，独立场景要求至少为 2
num_targets = 4               # Memory Target/分区数量
uops_per_master = 256         # 每个 Master 产生的 uop 数量，必须为偶数
cycles = 200000               # 用例允许执行的最大仿真周期

# Target 地址交织。
# interleave 可选 none、linear、xor；none 表示不交织。
interleave = "linear"
interleave_size = 128         # 交织粒度，单位：字节
interleave_hash_shift = 6     # XOR 交织使用的地址右移位数
interleave_hash_seed = 0      # XOR 交织扰动种子

# 接口和 Target 固定延迟，单位均为时钟周期。
master_inf_delay = 1          # Master 到 NIU 接口延迟
target_inf_delay = 1          # TargetPort 到 Memory 接口延迟
target_frontend_latency = 1   # Target 前端接收和排队前处理延迟
target_forward_latency = 0    # Target 请求向后端转发延迟
target_response_latency = 1   # Target 响应生成/返回延迟
target_header_latency = 1     # Target 处理报文头的固定延迟
target_width_bytes = 32       # Target 每周期服务宽度，单位：字节/周期
hotspot_threshold = 16        # Target 在途量达到该阈值后视为热点
hotspot_penalty = 0           # 热点状态附加延迟，单位：周期

# 各级缓冲深度，单位：报文项数。
master_fifo_depth = 16        # 每个 Master NIU 的请求/数据 FIFO 深度
target_fifo_depth = 16        # 每个 TargetPort 的请求 FIFO 深度

# Outstanding（OSD）限制，单位：未完成事务数。
# Master OSD 控制单个 Master 的并行读写事务；Global OSD 控制全局并行事务。
master_rd_osd = 16
master_wr_osd = 16
global_osd = 64
# Target OSD 对应 Target 侧读、写和读写合计槽位。
# 独立多核场景要求显式且非零，禁止使用 0 静默继承 DDR credit。
# 注意：这里覆盖的是 Target slot/OSD 上限；带宽 token 的最大值和补充速率
# 仍来自上面的 ddr_config，因此 DDR TOML 仍会直接影响吞吐和反压。
target_rd_osd = 16
target_wr_osd = 16
target_acc_osd = 32

# Ring Link 参数。
ring_link_latency = 1         # 单跳固定传播延迟，同时决定 Link FIFO depth 和 max inflight
ring_link_width_bytes = 16    # 单条 Link 每周期序列化宽度，单位：字节/周期
ring_req_header_bytes = 16    # RD/WR 请求头占用的链路字节数
ring_rsp_header_bytes = 16    # 无数据响应头占用的链路字节数

# 性能检查。
clock_ghz = 1.0               # 用于将 bytes/cycle 换算为 GB/s
performance_target_pct = 80.0 # 性能精度/利用率目标，当前为待校准目标值
# false：只报告是否达到目标；true：未达到目标时将用例判为失败。
require_performance_target = false

[case.multi_core]
# 主场景：4 Master、4 Target，继承 [default] 的全部参数。

[case.multi_core_backpressure]
# 多核反压场景：保持 4 个 Master，将 Target、FIFO 和 Link in-flight 资源收紧，
# 用于回归验证串行化忙、in-flight 耗尽、Link FIFO 满和下游 FIFO 满等瓶颈分类。
num_targets = 2
cycles = 300000
master_fifo_depth = 2
target_fifo_depth = 2
