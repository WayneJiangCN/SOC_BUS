<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
<defs>
<marker id="a-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563EB"/></marker>
<marker id="a-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#D97706"/></marker>
<marker id="a-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#059669"/></marker>
<marker id="a-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748B"/></marker>
<marker id="a-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#C2413B"/></marker>
<style>.t{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#1F2937}.s{font-size:18px}.m{font-size:21px;font-weight:600}.h{font-size:30px;font-weight:700}.sub{font-size:17px;fill:#475569}.tiny{font-size:15px;fill:#475569}</style>
</defs>
<rect x="0" y="0" width="1400" height="800" fill="#FFFFFF"/>
<text x="48" y="48" class="t h">请求、写数据与响应路径</text>
<text x="48" y="78" class="t sub">事务键 TxnKey={MasterID, LocalTxnID, Epoch} 在所有阶段保持稳定；Seq/BeatIndex关联多段返回</text>
<rect x="80" y="110" width="200" height="62" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/>
<text x="180.0" y="139" text-anchor="middle" class="t m" style="font-size:17px">流量源适配层</text>
<line x1="180" y1="172" x2="180" y2="680" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 6"/>
<rect x="330" y="110" width="200" height="62" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/>
<text x="430.0" y="139" text-anchor="middle" class="t m" style="font-size:17px">Master网络接口</text>
<line x1="430" y1="172" x2="430" y2="680" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 6"/>
<rect x="570" y="110" width="200" height="62" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/>
<text x="670.0" y="139" text-anchor="middle" class="t m" style="font-size:17px">Ring传输平面</text>
<line x1="670" y1="172" x2="670" y2="680" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 6"/>
<rect x="830" y="110" width="200" height="62" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/>
<text x="930.0" y="139" text-anchor="middle" class="t m" style="font-size:17px">Target网络接口</text>
<line x1="930" y1="172" x2="930" y2="680" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 6"/>
<rect x="1080" y="110" width="200" height="62" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/>
<text x="1180.0" y="139" text-anchor="middle" class="t m" style="font-size:17px">Target服务模型</text>
<line x1="1180" y1="172" x2="1180" y2="680" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 6"/>
<text x="50" y="225" text-anchor="start" class="t m" style="fill:#1F4E79;">读事务</text>
<polyline points="180,220 430,220 670,220 930,220 1180,220" fill="none" stroke="#2563EB" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#a-blue)"/>
<text x="680" y="208" text-anchor="middle" class="t tiny" style="fill:#2563EB;">READ_REQ / TxnKey / ExpectedRsp</text>
<polyline points="1180,275 930,275 670,275 430,275 180,275" fill="none" stroke="#059669" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="4 5" marker-end="url(#a-green)"/>
<text x="680" y="264" text-anchor="middle" class="t tiny" style="fill:#059669;">READ_RSP / TxnKey / Seq / Last</text>
<text x="435" y="300" text-anchor="middle" class="t tiny" style="">Last响应被上游接受后释放Master OSD</text>
<line x1="55" y1="330" x2="1345" y2="330" stroke="#94A3B8" stroke-width="1.5"/>
<text x="50" y="385" text-anchor="start" class="t m" style="fill:#1F4E79;">写事务</text>
<polyline points="180,380 430,380 670,380 930,380 1180,380" fill="none" stroke="#2563EB" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#a-blue)"/>
<text x="680" y="368" text-anchor="middle" class="t tiny" style="fill:#2563EB;">WRITE_REQ / TxnKey / DataLength</text>
<polyline points="1180,430 930,430 670,430 430,430" fill="none" stroke="#059669" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="4 5" marker-end="url(#a-green)"/>
<text x="795" y="418" text-anchor="middle" class="t tiny" style="fill:#059669;">WRITE_GRANT / TxnKey / DataTag</text>
<polyline points="430,490 670,490 930,490 1180,490" fill="none" stroke="#D97706" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="12 6" marker-end="url(#a-orange)"/>
<text x="805" y="478" text-anchor="middle" class="t tiny" style="fill:#D97706;">WRITE_DATA / TxnKey / DataTag / BeatIndex</text>
<polyline points="1180,550 930,550 670,550 430,550 180,550" fill="none" stroke="#059669" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="4 5" marker-end="url(#a-green)"/>
<text x="680" y="538" text-anchor="middle" class="t tiny" style="fill:#059669;">WRITE_COMPLETE / TxnKey / Status</text>
<text x="680" y="600" text-anchor="middle" class="t s" style="font-weight:600;">请求头与写数据可解耦传输，但Target提交前必须按TxnKey/DataTag闭环关联</text>
<text x="680" y="632" text-anchor="middle" class="t tiny" style="">错误、超时或取消均必须生成终结状态；不得静默丢弃或提前复用payload</text>
<polyline points="52,752 107,752" fill="none" stroke="#2563EB" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#a-blue)"/>
<text x="120" y="758" text-anchor="start" class="t tiny" style="">请求</text>
<polyline points="242,752 297,752" fill="none" stroke="#D97706" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="12 6" marker-end="url(#a-orange)"/>
<text x="310" y="758" text-anchor="start" class="t tiny" style="">写数据</text>
<polyline points="432,752 487,752" fill="none" stroke="#059669" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="4 5" marker-end="url(#a-green)"/>
<text x="500" y="758" text-anchor="start" class="t tiny" style="">响应</text>
<polyline points="622,752 677,752" fill="none" stroke="#64748B" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="12 5 2 5" marker-end="url(#a-gray)"/>
<text x="690" y="758" text-anchor="start" class="t tiny" style="">配置/统计</text>
<polyline points="812,752 867,752" fill="none" stroke="#C2413B" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="2 6" marker-end="url(#a-red)"/>
<text x="880" y="758" text-anchor="start" class="t tiny" style="">反压</text>
</svg>