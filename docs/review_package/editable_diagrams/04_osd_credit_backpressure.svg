<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
<defs>
<marker id="a-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563EB"/></marker>
<marker id="a-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#D97706"/></marker>
<marker id="a-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#059669"/></marker>
<marker id="a-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748B"/></marker>
<marker id="a-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#C2413B"/></marker>
<style>.t{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#1F2937}.s{font-size:18px}.m{font-size:21px;font-weight:600}.h{font-size:30px;font-weight:700}.sub{font-size:17px;fill:#475569}.tiny{font-size:15px;fill:#475569}</style>
</defs>
<rect x="0" y="0" width="1400" height="800" fill="#FFFFFF"/>
<text x="48" y="48" class="t h">OSD、Credit、FIFO与反压协同</text>
<text x="48" y="78" class="t sub">端到端并发、接收能力、突发吸收和链路带宽分别建模；下游恢复时由持续vld/ready事件自动重试</text>
<rect x="55" y="210" width="210" height="250" rx="4" fill="#EEF4FA" stroke="#2E74B5" stroke-width="2"/>
<text x="160.0" y="239" text-anchor="middle" class="t m" style="font-size:18px">Master网络接口</text>
<text x="160.0" y="268" text-anchor="middle" class="t tiny">Master OSD=已接受未完成</text>
<text x="160.0" y="292" text-anchor="middle" class="t tiny">请求/数据注入FIFO</text>
<text x="160.0" y="316" text-anchor="middle" class="t tiny">事务追踪表</text>
<text x="160.0" y="340" text-anchor="middle" class="t tiny">vld保持直到握手</text>
<rect x="320" y="210" width="210" height="250" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/>
<text x="425.0" y="239" text-anchor="middle" class="t m" style="font-size:18px">Ring Router</text>
<text x="425.0" y="268" text-anchor="middle" class="t tiny">输入FIFO</text>
<text x="425.0" y="292" text-anchor="middle" class="t tiny">输出仲裁</text>
<text x="425.0" y="316" text-anchor="middle" class="t tiny">队头保持</text>
<text x="425.0" y="340" text-anchor="middle" class="t tiny">按流量类调度</text>
<rect x="585" y="210" width="210" height="250" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/>
<text x="690.0" y="239" text-anchor="middle" class="t m" style="font-size:18px">Ring Link</text>
<text x="690.0" y="268" text-anchor="middle" class="t tiny">in-flight容量</text>
<text x="690.0" y="292" text-anchor="middle" class="t tiny">序列化占用</text>
<text x="690.0" y="316" text-anchor="middle" class="t tiny">传播延迟</text>
<text x="690.0" y="340" text-anchor="middle" class="t tiny">下游满则不出队</text>
<rect x="850" y="210" width="210" height="250" rx="4" fill="#EEF8F4" stroke="#0B6E4F" stroke-width="2"/>
<text x="955.0" y="239" text-anchor="middle" class="t m" style="font-size:18px">Target网络接口</text>
<text x="955.0" y="268" text-anchor="middle" class="t tiny">Target Credit</text>
<text x="955.0" y="292" text-anchor="middle" class="t tiny">Target请求FIFO</text>
<text x="955.0" y="316" text-anchor="middle" class="t tiny">响应回注FIFO</text>
<text x="955.0" y="340" text-anchor="middle" class="t tiny">服务准入</text>
<rect x="1115" y="210" width="230" height="250" rx="4" fill="#EEF8F4" stroke="#0B6E4F" stroke-width="2"/>
<text x="1230.0" y="239" text-anchor="middle" class="t m" style="font-size:18px">Target服务模型</text>
<text x="1230.0" y="268" text-anchor="middle" class="t tiny">固定/分布服务延迟</text>
<text x="1230.0" y="292" text-anchor="middle" class="t tiny">读写服务带宽</text>
<text x="1230.0" y="316" text-anchor="middle" class="t tiny">Bank/队列并发</text>
<text x="1230.0" y="340" text-anchor="middle" class="t tiny">完成/响应产生</text>
<polyline points="265,365 320,365 530,365 585,365 795,365 850,365 1060,365 1115,365" fill="none" stroke="#2563EB" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#a-blue)"/>
<polyline points="265,395 320,395 530,395 585,395 795,395 850,395 1060,395 1115,395" fill="none" stroke="#D97706" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="12 6" marker-end="url(#a-orange)"/>
<polyline points="1115,425 1060,425 850,425 795,425 585,425 530,425 320,425 265,425 55,425" fill="none" stroke="#059669" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="4 5" marker-end="url(#a-green)"/>
<polyline points="1115,495 1100,495 1100,505 850,505 850,515 585,515 585,525 320,525 320,535 55,535" fill="none" stroke="#C2413B" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="2 6" marker-end="url(#a-red)"/>
<text x="700" y="565" text-anchor="middle" class="t tiny" style="fill:#C2413B;">空间 / Credit / ready恢复</text>
<text x="700" y="595" text-anchor="middle" class="t s" style="fill:#C2413B;font-weight:600;">状态变化触发重评估；vld仍为1的队头自动重试</text>
<rect x="450" y="625" width="500" height="72" rx="4" fill="#FFF7ED" stroke="#B45F06" stroke-width="2"/>
<text x="700.0" y="654" text-anchor="middle" class="t m" style="font-size:18px">资源释放规则</text>
<text x="700.0" y="683" text-anchor="middle" class="t tiny">Master OSD：终结响应被上游接受；Target Credit：Target占用真正结束；FIFO：下游握手成功</text>
<polyline points="52,748 107,748" fill="none" stroke="#2563EB" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#a-blue)"/>
<text x="120" y="754" text-anchor="start" class="t tiny" style="">请求</text>
<polyline points="242,748 297,748" fill="none" stroke="#D97706" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="12 6" marker-end="url(#a-orange)"/>
<text x="310" y="754" text-anchor="start" class="t tiny" style="">写数据</text>
<polyline points="432,748 487,748" fill="none" stroke="#059669" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="4 5" marker-end="url(#a-green)"/>
<text x="500" y="754" text-anchor="start" class="t tiny" style="">响应</text>
<polyline points="622,748 677,748" fill="none" stroke="#64748B" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="12 5 2 5" marker-end="url(#a-gray)"/>
<text x="690" y="754" text-anchor="start" class="t tiny" style="">配置/统计</text>
<polyline points="812,748 867,748" fill="none" stroke="#C2413B" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="2 6" marker-end="url(#a-red)"/>
<text x="880" y="754" text-anchor="start" class="t tiny" style="">反压</text>
</svg>