<text x="700" y="625" text-anchor="middle" class="t m" style="fill:#1F4E79;">T_total = T_fixed + T_topology + T_serialization + T_arbitration + T_queue + T_target + T_return</text>
<text x="700" y="660" text-anchor="middle" class="t s" style="">吞吐上界 = min(源端注入，Ring最小割，Target服务，响应带宽，OSD×有效载荷/平均RTT)</text>
