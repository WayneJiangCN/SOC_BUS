<rect x="85" y="410" width="270" height="150" rx="4" fill="#FFF7ED" stroke="#B45F06" stroke-width="2"/>
<text x="220.0" y="439" text-anchor="middle" class="t m" style="font-size:18px">容量瓶颈：源端</text>
<text x="220.0" y="468" text-anchor="middle" class="t tiny">OSD &lt; 带宽时延积</text>
<text x="220.0" y="492" text-anchor="middle" class="t tiny">注入端口带宽不足</text>
<text x="220.0" y="516" text-anchor="middle" class="t tiny">流量源无法持续供给</text>
<rect x="395" y="410" width="270" height="150" rx="4" fill="#FFF7ED" stroke="#B45F06" stroke-width="2"/>
<text x="530.0" y="439" text-anchor="middle" class="t m" style="font-size:18px">容量瓶颈：Ring最小割</text>
<text x="530.0" y="468" text-anchor="middle" class="t tiny">热点链路利用率≈100%</text>
<text x="530.0" y="492" text-anchor="middle" class="t tiny">仲裁等待与FIFO占用上升</text>
<text x="530.0" y="516" text-anchor="middle" class="t tiny">方向/映射不均衡</text>
<rect x="705" y="410" width="270" height="150" rx="4" fill="#FFF7ED" stroke="#B45F06" stroke-width="2"/>
<text x="840.0" y="439" text-anchor="middle" class="t m" style="font-size:18px">容量瓶颈：Target</text>
<text x="840.0" y="468" text-anchor="middle" class="t tiny">Credit长期接近0</text>
<text x="840.0" y="492" text-anchor="middle" class="t tiny">服务队列增长</text>
<text x="840.0" y="516" text-anchor="middle" class="t tiny">目标带宽/Bank冲突</text>
<rect x="1015" y="410" width="300" height="150" rx="4" fill="#FFF7ED" stroke="#B45F06" stroke-width="2"/>
